<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simpsons Cara a Cara - Springfield Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sniglet:wght=800&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            font-family: 'Sniglet', 'Comic Sans MS', cursive;
            background: #5c9ced;
            background-image: radial-gradient(rgba(255,255,255,0.3) 15%, transparent 16%);
            background-size: 30px 30px;
            min-height: 100vh;
            color: #3d2100;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        @keyframes floatCloud {
            from { transform: translateX(-30vw); }
            to { transform: translateX(120vw); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }
        @keyframes avatarPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(3deg); }
            100% { transform: scale(1); }
        }
        @keyframes logoIntro {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes zoomOutSky {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; visibility: hidden; }
        }
        
        .cloud {
            position: fixed; background: #ffffff; border-radius: 100px; pointer-events: none; z-index: 0;
            box-shadow: -4px 4px 0 rgba(0,0,0,0.1); animation: floatCloud 35s linear infinite;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #ffffff; border-radius: 50%; }
        .cloud::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud::after { width: 60px; height: 60px; top: -25px; right: 20px; }

        .container { 
            position: relative; z-index: 2; width: 100%; max-width: 500px; margin: 0 auto; 
            padding: 12px; display: flex; flex-direction: column; flex-grow: 1;
        }
        
        .intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #5c9ced;
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .intro-overlay.fade-out { animation: zoomOutSky 0.8s forwards ease-in-out; }
        .intro-content { text-align: center; animation: logoIntro 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .intro-title { 
            font-size: clamp(2.2rem, 12vw, 4.5rem); color: #ffd000; 
            text-shadow: 4px 4px 0 #3d2100, -4px -4px 0 #3d2100, 4px -4px 0 #3d2100, -4px 4px 0 #3d2100, 8px 8px 0 rgba(0,0,0,0.15);
            font-weight: 900; letter-spacing: -1px;
        }
        .intro-sub { color: white; font-size: 1.1rem; font-weight: bold; text-shadow: 2px 2px 0 #3d2100; margin-top: -5px; }
        
        .springfield-header {
            background: #ffd000; border: 4px solid #3d2100; border-radius: 20px; padding: 12px;
            margin-bottom: 15px; box-shadow: 0 6px 0 #3d2100; text-align: center;
        }
        .springfield-title { font-size: clamp(1.3rem, 5.5vw, 2rem); color: #fff; text-shadow: 3px 3px 0 #3d2100, -1px -1px 0 #3d2100, 1px -1px 0 #3d2100, -1px 1px 0 #3d2100; font-weight: 900; }
        .springfield-subtitle { color: #3d2100; font-size: 0.85rem; font-weight: bold; margin-top: 5px; }
        
        .panel { background: #fff; border: 4px solid #3d2100; border-radius: 20px; padding: 15px; box-shadow: 0 6px 0 #3d2100; margin-bottom: 15px; }

        .characters-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; padding: 4px;
            max-height: 55vh;
            overflow-y: auto;
        }
        
        .character-card {
            background: #fff; border: 3px solid #3d2100; border-radius: 12px; padding: 6px;
            transition: transform 0.1s ease, box-shadow 0.1s ease; box-shadow: 0 3px 0 #3d2100; cursor: pointer; text-align: center;
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .character-card:active { transform: translateY(2px); box-shadow: 0 1px 0 #3d2100; }
        .character-card.flipped {
            background: #e2e8f0;
            border-color: #718096;
            box-shadow: 0 1px 0 #718096;
            transform: translateY(2px);
        }
        .character-card.flipped img {
            filter: grayscale(100%) brightness(70%);
            opacity: 0.4;
            background: #cbd5e0;
            border-color: #718096;
        }
        .character-card.flipped .character-name {
            color: #718096;
            text-decoration: line-through;
        }
        .character-card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #ebf4fa; border-radius: 8px; padding: 3px; border: 2px solid #3d2100; }
        .character-name { font-weight: bold; color: #3d2100; font-size: clamp(9px, 2.5vw, 11px); display: block; margin-top: 5px; line-height: 1.1; word-break: break-word; }
        
        .btn {
            padding: 10px 16px; font-size: 0.9rem; font-weight: bold; border: 3px solid #3d2100; border-radius: 50px;
            cursor: pointer; font-family: inherit; box-shadow: 0 4px 0 #3d2100; transition: all 0.05s ease; margin: 5px; text-transform: uppercase;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #3d2100; }
        
        .btn-donut { background: #ff69b4; color: white; text-shadow: 2px 2px 0 #3d2100; } 
        .btn-simpson { background: #ffd000; color: #3d2100; } 
        .btn-krusty { background: #4ecdc4; color: white; text-shadow: 2px 2px 0 #3d2100; } 
        .btn-danger { background: #ff4757; color: white; text-shadow: 2px 2px 0 #3d2100; }
        .btn-success { background: #2ed573; color: white; text-shadow: 2px 2px 0 #3d2100; }

        input[type="text"], input[type="password"] {
            padding: 10px 16px; border-radius: 30px; border: 3px solid #3d2100; font-family: inherit;
            font-size: 0.95rem; margin: 6px auto; width: 90%; max-width: 280px; display: block; box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        input:focus { outline: none; background: #fffde6; }
        
        .game-top-area {
            background: #fff6d1;
            border: 3px solid #3d2100;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 0 #3d2100;
        }
        
        .question-area, .response-area { 
            background: #fff6d1; 
            border: 3px solid #3d2100; 
            border-radius: 16px; 
            padding: 12px; 
            margin: 8px 0; 
            box-shadow: 0 4px 0 #3d2100; 
            text-align: center; 
        }
        .question-area input { 
            width: 100%; 
            max-width: 100%; 
            margin: 8px 0; 
            font-size: 0.9rem;
            padding: 10px;
        }
        
        .live-status-box {
            background: #fffae6; 
            border: 3px dashed #ff69b4; 
            border-radius: 14px; 
            padding: 10px; 
            margin: 8px 0; 
            text-align: center;
        }
        .live-badge {
            display: inline-block; 
            padding: 4px 12px; 
            background: #ff69b4; 
            color: white; 
            border-radius: 20px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            margin-bottom: 8px;
        }
        .live-text { 
            font-size: 0.9rem; 
            font-weight: bold; 
            color: #3d2100; 
            line-height: 1.3; 
            word-break: break-word;
        }

        .history-container { 
            margin: 10px 0;
        }
        .history-title { 
            font-size: 0.8rem; 
            font-weight: bold; 
            color: #3d2100; 
            margin-bottom: 6px; 
            padding-left: 6px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-title span {
            background: #ffd000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .chat-area { 
            background: #231f20; 
            color: #fff; 
            border: 4px solid #3d2100; 
            padding: 10px; 
            border-radius: 12px; 
            max-height: 140px; 
            overflow-y: auto; 
            font-size: 0.75rem; 
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.4);
            display: flex; 
            flex-direction: column; 
            gap: 6px;
        }
        .chat-line { 
            border-bottom: 1px dashed rgba(255,255,255,0.15); 
            padding-bottom: 4px; 
            line-height: 1.3;
        }
        .chat-line strong { color: #ffd000; }
        .chat-line.system { color: #4ecdc4; font-style: italic; }
        
        .avatar-selector-scroll { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding: 8px 4px; 
            margin: 10px 0;
            scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch;
        }
        .avatar-option { 
            flex: 0 0 60px; 
            width: 60px; 
            height: 60px; 
            border: 3px solid #3d2100; 
            border-radius: 50%; 
            padding: 4px; 
            background: #fff; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            scroll-snap-align: center;
        }
        .avatar-option:active { transform: scale(0.9); }
        .avatar-option.selected { background: #ffd000; border-color: #ff69b4; transform: scale(1.1); box-shadow: 0 4px 8px rgba(0,0,0,0.15); animation: avatarPop 0.4s ease; }
        .avatar-option img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }

        .avatar-spin { 
            width: 75px; 
            height: 75px; 
            background: #ffd000; 
            border: 3px solid #3d2100; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 10px; 
            box-shadow: 0 4px 0 #3d2100;
            animation: bounce 2.5s infinite ease-in-out; 
            padding: 6px;
        }
        .avatar-spin img { width: 100%; height: 100%; object-fit: contain; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px; }
        .turn-indicator { 
            padding: 8px 12px; 
            border-radius: 50px; 
            font-weight: bold; 
            border: 2px solid #3d2100; 
            box-shadow: 0 3px 0 #3d2100; 
            font-size: 0.75rem; 
            text-align: center; 
            flex-grow: 1; 
            max-width: 160px;
        }
        .turn-mine { background: #7bed9f; color: #3d2100; animation: avatarPop 1.5s infinite; }
        .turn-opponent { background: #ff6b81; color: white; }
        
        .secret-badge {
            background: white; 
            padding: 6px 12px; 
            border-radius: 20px; 
            border: 2px solid #3d2100; 
            font-size: 0.7rem; 
            font-weight: bold; 
            text-align: center;
            white-space: nowrap;
        }
        .secret-badge strong { color: #ff69b4; font-size: 0.8rem; }
        
        .toast { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #3d2100; 
            color: #ffd000; 
            padding: 8px 20px; 
            border-radius: 50px; 
            z-index: 20000; 
            font-weight: bold; 
            font-size: 0.85rem; 
            border: 2px solid #ffd000; 
            text-align: center; 
            width: 80%; 
            max-width: 300px;
            animation: bounce 0.3s ease;
        }

        .room-code-display { 
            font-size: 1.8rem; 
            font-weight: 900; 
            background: #ff69b4; 
            color: white; 
            border: 3px solid #3d2100; 
            padding: 8px; 
            border-radius: 16px; 
            text-align: center; 
            letter-spacing: 4px; 
            margin: 12px 0; 
            box-shadow: 0 4px 0 #3d2100; 
            text-shadow: 2px 2px 0 #3d2100; 
        }
        .waiting-spinner { 
            width: 35px; 
            height: 35px; 
            border: 5px solid #fff; 
            border-top-color: #ffd000; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin: 12px auto; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .victory-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(92, 156, 237, 0.98); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 15000; 
        }
        .victory-card { 
            background: #ffd000; 
            border-radius: 24px; 
            padding: 25px 20px; 
            text-align: center; 
            max-width: 340px; 
            width: 92%; 
            border: 5px solid #3d2100; 
            box-shadow: 0 10px 0 #3d2100; 
        }
        .victory-card h2 { font-size: 2rem; color: #fff; text-shadow: 3px 3px 0 #3d2100; margin-bottom: 10px; }
        .victory-card p { font-size: 1rem; font-weight: bold; margin-bottom: 15px; }
        .victory-reveal-img { width: 100px; height: 100px; object-fit: contain; background: white; border: 4px solid #3d2100; border-radius: 16px; margin: 10px auto 15px; display: block; box-shadow: 0 5px 0 #3d2100; padding: 5px; }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #fffde6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffd000; border-radius: 10px; border: 1px solid #3d2100; }
        
        @media (max-width: 480px) {
            .container { padding: 8px; }
            .characters-grid { gap: 6px; max-height: 50vh; }
            .character-card { padding: 4px; }
            .btn { padding: 8px 12px; font-size: 0.8rem; margin: 3px; }
            .turn-indicator { font-size: 0.65rem; padding: 6px 8px; }
            .secret-badge { font-size: 0.6rem; padding: 4px 8px; white-space: normal; }
            .live-text { font-size: 0.8rem; }
            .chat-area { max-height: 110px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div id="introScreen" class="intro-overlay">
    <div class="intro-content">
        <div class="intro-title">The SIMPSONS</div>
        <div class="intro-sub">CARA A CARA • ONLINE</div>
    </div>
</div>

<div id="app" class="container"></div>

<script>
    const SIMPSONS = [
        { id: 1, nome: 'Homer Simpson', img: 'imagens/Homer_Simpson.png' },
        { id: 2, nome: 'Marge Simpson', img: 'imagens/Marge_Simpson.png' },
        { id: 3, nome: 'Bart Simpson', img: 'imagens/Bart_Simpson.png' },
        { id: 4, nome: 'Lisa Simpson', img: 'imagens/Lisa_Simpson.png' },
        { id: 5, nome: 'Maggie Simpson', img: 'imagens/Maggie_Simpson.png' },
        { id: 6, nome: 'Moe Szyslak', img: 'imagens/Moe_Szyslak.png' },
        { id: 7, nome: 'Ned Flanders', img: 'imagens/Ned_Flanders.png' },
        { id: 8, nome: 'Krusty', img: 'imagens/Krusty_personagem.png' },
        { id: 9, nome: 'Mr. Burns', img: 'imagens/Mr_Burns.png' },
        { id: 10, nome: 'Nelson Muntz', img: 'imagens/Nelson_Muntz.png' },
        { id: 11, nome: 'Milhouse', img: 'imagens/Milhouse_Van_Houten.png' },
        { id: 12, nome: 'Apu', img: 'imagens/File-Apuu.png' },
        { id: 13, nome: 'Chefe Wiggum', img: 'imagens/245px-Chief_Wiggum.png' },
        { id: 14, nome: 'Diretor Skinner', img: 'imagens/Seymour_Skinner.png' },
        { id: 15, nome: 'Ralph Wiggum', img: 'imagens/Ralph_Wiggum.png' },
        { id: 16, nome: 'Comic Book Guy', img: 'imagens/The_Simpsons-Jeff_Albertson.png' },
        { id: 17, nome: 'Barney Gumble', img: 'imagens/Barney_Gumble.png' },
        { id: 18, nome: 'Vovô Simpson', img: 'imagens/Abraham_Simpson.png' },
        { id: 19, nome: 'Waylon Smithers', img: 'imagens/222px-Waylon_Smithers_1.png' },
        { id: 20, nome: 'Zelador Willie', img: 'imagens/Groundskeeper_Willie.png' },
        { id: 21, nome: 'Patty Bouvier', img: 'imagens/Patty_Bouvier.png' },
        { id: 22, nome: 'Selma Bouvier', img: 'imagens/Selma_Bouvier.png' },
        { id: 23, nome: 'Lenny Leonard', img: 'imagens/Lenny_Leonard.png' },
        { id: 24, nome: 'Carl Carlson', img: 'imagens/Carl.png' }
    ];

    const firebaseConfig = {
        apiKey: "AIzaSyATdGCu7aiCX-JSCpr2gvsS_GBYSl_cSUs",
        authDomain: "babydoll-38338.firebaseapp.com",
        databaseURL: "https://babydoll-38338-default-rtdb.firebaseio.com",
        projectId: "babydoll-38338",
        storageBucket: "babydoll-38338.firebasestorage.app",
        messagingSenderId: "532837179930",
        appId: "1:532837179930:web:9bca40773fb2304b23e7a3"
    };
    
    let db = null;
    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        }
    } catch(e) { console.log("Erro Firebase", e); }

    let usuarioAtual = null;
    let usuarios = JSON.parse(localStorage.getItem('simpsons_usuarios') || '[]');
    let salaListener = null;
    let meuId = Math.random().toString(36).substring(2, 8);
    let avatarRegistrando = SIMPSONS[0].img; 
    window.cartasFlipped = {};

    function toast(msg) { 
        const t=document.createElement('div'); t.className='toast'; t.innerText=msg; 
        document.body.appendChild(t); setTimeout(()=>t.remove(),2200); 
    }
    function salvarUsuarios() { localStorage.setItem('simpsons_usuarios', JSON.stringify(usuarios)); }
    function setUsuario(user) { usuarioAtual = user; localStorage.setItem('simpsons_atual', JSON.stringify(user)); }

    const app = document.getElementById('app');
    
    setTimeout(() => { 
        const intro = document.getElementById('introScreen'); 
        if(intro) { intro.classList.add('fade-out'); setTimeout(()=>intro.remove(),800); } 
    }, 2000);

    for(let i=0; i<5; i++){ 
        const c=document.createElement('div'); c.className='cloud'; 
        c.style.cssText=`width:${100+Math.random()*100}px;height:${35+Math.random()*15}px;top:${5+Math.random()*40}%;left:-160px;animation-delay:${Math.random()*12}s;animation-duration:${25+Math.random()*15}s;`; 
        document.body.appendChild(c); 
    }

    telaPrincipal();

    function telaPrincipal() {
        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header">
                <div class="springfield-title">🍩 CARA A CARA 🍩</div>
                <div class="springfield-subtitle">Springfield Multiplayer Edition</div>
            </div>
            <div class="panel" style="text-align:center;">
                <p style="margin-bottom:15px; font-weight:bold; font-size:0.95rem;">Adivinhe o personagem secreto do seu oponente!</p>
                <button class="btn btn-donut" id="btnJogar" style="width:90%">🍩 ENTRAR NO JOGO</button>
            </div>
        </div>`;
        document.getElementById('btnJogar')?.addEventListener('click', () => {
            const salvo = localStorage.getItem('simpsons_atual');
            if(salvo) { usuarioAtual = JSON.parse(salvo); telaPerfil(); } else { telaLogin(); }
        });
    }

    function telaLogin() {
        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header"><div class="springfield-title">🏪 TAVERNA DO MOE</div></div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin"><img src="${SIMPSONS[5].img}"></div>
                <input type="text" id="loginNome" placeholder="Cidadão (Usuário)">
                <input type="password" id="loginSenha" placeholder="Senha">
                <button class="btn btn-simpson" id="btnEntrar" style="width:85%">Entrar</button>
                <button class="btn btn-krusty" id="btnCadastrar" style="width:85%">Criar Nova Conta</button>
            </div>
        </div>`;
        document.getElementById('btnEntrar')?.addEventListener('click', () => {
            const nome = document.getElementById('loginNome').value.trim();
            const senha = document.getElementById('loginSenha').value;
            const user = usuarios.find(u => u.nome.toLowerCase() === nome.toLowerCase() && u.senha === senha);
            if(user) { setUsuario(user); telaPerfil(); } else toast('Acesso negado, cara!');
        });
        document.getElementById('btnCadastrar')?.addEventListener('click', telaRevisionadaRegistro);
    }

    function mudeAvatarRegistro(url, el) {
        avatarRegistrando = url;
        document.querySelectorAll('.avatar-option').forEach(box => box.classList.remove('selected'));
        el.classList.add('selected');
        const prev = document.getElementById('avatarPrevImg');
        if(prev) prev.src = url;
    }
    window.mudeAvatarRegistro = mudeAvatarRegistro;

    function telaRevisionadaRegistro() {
        avatarRegistrando = SIMPSONS[0].img;
        let avataresHtml = SIMPSONS.map((p, idx) => `
            <div class="avatar-option ${idx===0?'selected':''}" onclick="window.mudeAvatarRegistro('${p.img}', this)">
                <img src="${p.img}">
            </div>
        `).join('');

        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header"><div class="springfield-title">📝 REGISTRO</div></div>
            <div class="panel" style="text-align:center;">
                <div id="avatarPrev" class="avatar-spin"><img id="avatarPrevImg" src="${avatarRegistrando}"></div>
                <p style="font-weight:bold; font-size:0.85rem; margin-bottom:2px;">Arraste para o lado e mude seu avatar:</p>
                <div class="avatar-selector-scroll">${avataresHtml}</div>
                <input type="text" id="regNome" placeholder="Nome do Personagem">
                <input type="password" id="regSenha" placeholder="Senha Segura">
                <button class="btn btn-krusty" id="btnRegistrar" style="width:85%">Criar Conta</button>
                <button class="btn btn-danger" id="btnVoltarLogin" style="width:85%">Cancelar</button>
            </div>
        </div>`;
        
        document.getElementById('btnRegistrar')?.addEventListener('click', () => {
            const nome = document.getElementById('regNome').value.trim();
            const senha = document.getElementById('regSenha').value;
            if(!nome||!senha) { toast('Preencha os campos!'); return; }
            if(usuarios.find(u=>u.nome.toLowerCase()===nome.toLowerCase())) { toast('Nome indisponível!'); return; }
            
            const novoUsuario = { nome, senha, avatar: avatarRegistrando, pontos: 0 };
            usuarios.push(novoUsuario);
            salvarUsuarios();
            setUsuario(novoUsuario);
            telaPerfil();
        });
        document.getElementById('btnVoltarLogin')?.addEventListener('click', telaLogin);
    }

    function telaEditarPerfil() {
        avatarRegistrando = usuarioAtual.avatar;
        let avataresHtml = SIMPSONS.map((p) => `
            <div class="avatar-option ${p.img === usuarioAtual.avatar ? 'selected' : ''}" onclick="window.mudeAvatarRegistro('${p.img}', this)">
                <img src="${p.img}">
            </div>
        `).join('');

        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header"><div class="springfield-title">✏️ EDITAR PERFIL</div></div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin"><img id="avatarPrevImg" src="${avatarRegistrando}"></div>
                <p style="font-weight:bold; font-size:0.85rem; margin-bottom:2px;">Escolha seu novo avatar:</p>
                <div class="avatar-selector-scroll">${avataresHtml}</div>
                <input type="text" id="editNome" value="${usuarioAtual.nome}" placeholder="Nome do Personagem">
                <button class="btn btn-krusty" id="btnSalvarPerfil" style="width:85%">Salvar Alterações</button>
                <button class="btn btn-danger" id="btnCancelarEdit" style="width:85%">Voltar</button>
            </div>
        </div>`;

        document.getElementById('btnSalvarPerfil')?.addEventListener('click', () => {
            const novoNome = document.getElementById('editNome').value.trim();
            if(!novoNome) { toast('O nome não pode ficar vazio!'); return; }
            const nomeExiste = usuarios.find(u => u.nome.toLowerCase() === novoNome.toLowerCase() && u.nome.toLowerCase() !== usuarioAtual.nome.toLowerCase());
            if(nomeExiste) { toast('Este nome já está em uso!'); return; }

            const idx = usuarios.findIndex(u => u.nome === usuarioAtual.nome && u.senha === usuarioAtual.senha);
            if(idx !== -1) {
                usuarios[idx].nome = novoNome;
                usuarios[idx].avatar = avatarRegistrando;
                salvarUsuarios();
                setUsuario(usuarios[idx]);
                toast('Perfil updated!');
                telaPerfil();
            }
        });
        document.getElementById('btnCancelarEdit')?.addEventListener('click', telaPerfil);
    }

    function telaPerfil() {
        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header"><div class="springfield-title">🏡 SEU PAINEL</div></div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin"><img src="${usuarioAtual.avatar}"></div>
                <h2 style="margin-bottom:5px; font-size:1.4rem;">${usuarioAtual.nome}</h2>
                <p style="color:#ff69b4; font-weight:bold; font-size:1rem; margin-bottom:15px;">⭐ ${usuarioAtual.pontos||0} Rosquinhas Coletadas</p>
                <button class="btn btn-donut" id="btnOnline" style="width:90%">🌍 PROCURAR SALA</button><br>
                <button class="btn btn-simpson" id="btnEditar" style="width:90%">✏️ EDITAR PERFIL</button><br>
                <button class="btn btn-danger" id="btnSair" style="width:90%">Desconectar</button>
            </div>
        </div>`;
        document.getElementById('btnOnline')?.addEventListener('click', () => { if(db) { lobbyOnline(); } else { toast('Firebase Off-line!'); } });
        document.getElementById('btnEditar')?.addEventListener('click', telaEditarPerfil);
        document.getElementById('btnSair')?.addEventListener('click', () => { localStorage.removeItem('simpsons_atual'); telaPrincipal(); });
    }

    function lobbyOnline() {
        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header"><div class="springfield-title">☢️ USINA NUCLEAR</div></div>
            <div class="panel" style="text-align:center;">
                <p style="font-weight:bold; margin-bottom:15px; font-size:0.9rem;">Crie um novo setor de jogo ou digite o código do oponente!</p>
                <button class="btn btn-donut" id="btnCriarSala" style="width:90%">➕ CRIAR NOVA SALA</button>
                <div style="margin:15px 0; border-top: 2px dashed #3d2100; padding-top:15px;">
                    <input type="text" id="codigoSala" placeholder="CÓDIGO" maxlength="6" style="text-transform:uppercase; text-align:center; font-weight:bold;"><br>
                    <button class="btn btn-krusty" id="btnEntrarSala" style="width:90%">🔗 CONECTAR NA SALA</button>
                </div>
                <button class="btn btn-danger" id="btnVoltarPerfil" style="width:90%">Voltar</button>
            </div>
        </div>`;
        document.getElementById('btnCriarSala')?.addEventListener('click', () => {
            const codigo = Math.random().toString(36).substring(2,8).toUpperCase();
            const aleatorio = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)];
            window.cartasFlipped = {};
            db.ref(`salas/${codigo}`).set({
                codigo, criador: usuarioAtual.nome, criadorId: meuId, criadorSecreto: aleatorio.id,
                convidado: null, convidadoId: null, convidadoSecreto: null,
                vez: 'criador', status: 'espera', vencedor: null, perguntaAtual: null, respostaAtual: null, 
                historico: ["🎮 Sala criada! Aguardando oponente..."]
            });
            iniciarJogo(codigo, true);
        });
        document.getElementById('btnEntrarSala')?.addEventListener('click', () => { 
            const cod=document.getElementById('codigoSala').value.trim().toUpperCase(); 
            if(cod) entrarSala(cod); else toast('Insira um código!'); 
        });
        document.getElementById('btnVoltarPerfil')?.addEventListener('click', () => telaPerfil());
    }

    function entrarSala(codigo) {
        db.ref(`salas/${codigo}`).once('value', (snapshot) => {
            const sala = snapshot.val();
            if(!snapshot.exists()) { toast('Sala não encontrada!'); return; }
            if(sala.convidado && sala.convidadoId !== meuId) { toast('Sala cheia!'); return; }
            window.cartasFlipped = {};
            const aleatorio = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)];
            let hist = sala.historico || [];
            hist.push(`✨ ${usuarioAtual.nome} entrou no jogo!`);
            db.ref(`salas/${codigo}`).update({ 
                convidado: usuarioAtual.nome, convidadoId: meuId, convidadoSecreto: aleatorio.id, status: 'jogando', historico: hist
            });
            iniciarJogo(codigo, false);
        });
    }

    function iniciarJogo(codigo, souCriador) {
        if(salaListener) { salaListener.off(); salaListener = null; }
        salaListener = db.ref(`salas/${codigo}`);
        salaListener.on('value', (snapshot) => {
            const sala = snapshot.val();
            if(!sala) { if(salaListener) salaListener.off(); telaPerfil(); return; }
            if(souCriador && !sala.convidado) {
                app.innerHTML = `
                <div class="screen" style="width:100%">
                    <div class="springfield-header"><div class="springfield-title">⏳ ESPERANDO</div></div>
                    <div class="panel" style="text-align:center;">
                        <div class="waiting-spinner"></div>
                        <p style="font-weight:bold; margin-bottom:10px; font-size:0.9rem;">Compartilhe este código com o seu amigo:</p>
                        <div class="room-code-display">${codigo}</div>
                        <button class="btn btn-danger" id="btnCancelar" style="width:90%">Fechar Sala</button>
                    </div>
                </div>`;
                document.getElementById('btnCancelar')?.addEventListener('click', () => { if(salaListener) salaListener.off(); db.ref(`salas/${codigo}`).remove(); telaPerfil(); });
                return;
            }
            if(sala.vencedor) {
                const segredoOponenteId = souCriador ? sala.convidadoSecreto : sala.criadorSecreto;
                const oponenteObj = SIMPSONS.find(p => p.id === segredoOponenteId);
                mostrarVitoria(sala.vencedor === usuarioAtual.nome, sala.vencedor, oponenteObj, codigo);
                return;
            }
            renderizarJogo(sala, souCriador);
        });
    }

    window.toggleCartaLocal = function(id, el) {
        window.cartasFlipped[id] = !window.cartasFlipped[id];
        if (window.cartasFlipped[id]) {
            el.classList.add('flipped');
        } else {
            el.classList.remove('flipped');
        }
    }

    function renderizarJogo(sala, souCriador) {
        const meuSecretoId = souCriador ? sala.criadorSecreto : sala.convidadoSecreto;
        const meuSecretoObj = SIMPSONS.find(p => p.id === meuSecretoId);
        const ehMinhaVez = (sala.vez === 'criador' && souCriador) || (sala.vez === 'convidado' && !souCriador);
        const oponenteNome = souCriador ? sala.convidado : sala.criador;

        let painelInteracaoHtml = '';
        if (ehMinhaVez) {
            if (!sala.perguntaAtual) {
                painelInteracaoHtml = `
                <div class="question-area">
                    <p style="font-weight:bold; font-size:0.85rem; margin-bottom:8px;">❓ Sua vez! Faça uma pergunta ou chute:</p>
                    <input type="text" id="campoPergunta" placeholder="Ex: Tem cabelo azul? É homem? Usa camisa branca?" style="width:100%; margin-bottom:10px;">
                    <div class="flex-between">
                        <button class="btn btn-krusty" onclick="window.enviarPergunta('${sala.codigo}')" style="flex:1; font-size:0.8rem;">💬 Perguntar</button>
                        <button class="btn btn-donut" onclick="window.abrirModalChute('${sala.codigo}')" style="flex:1; font-size:0.8rem;">🎯 Chutar</button>
                    </div>
                </div>`;
            } else {
                painelInteracaoHtml = `
                <div class="live-status-box">
                    <span class="live-badge">⏳ AGUARDANDO RESPOSTA</span>
                    <div class="live-text">Você perguntou: <strong>"${sala.perguntaAtual}"</strong><br>Aguardando resposta de ${oponenteNome || 'oponente'}...</div>
                </div>`;
            }
        } else {
            if (sala.perguntaAtual && !sala.respostaAtual) {
                painelInteracaoHtml = `
                <div class="response-area">
                    <span class="live-badge" style="background:#ff4757;">🔔 RESPOSTA REQUERIDA</span>
                    <div class="live-text" style="margin: 10px 0;"><strong>${oponenteNome || 'Oponente'}</strong> perguntou:<br>"${sala.perguntaAtual}"</div>
                    <div class="flex-between">
                        <button class="btn btn-success" onclick="window.enviarResposta('${sala.codigo}', 'SIM')" style="flex:1;">✅ SIM</button>
                        <button class="btn btn-danger" onclick="window.enviarResposta('${sala.codigo}', 'NÃO')" style="flex:1;">❌ NÃO</button>
                    </div>
                </div>`;
            } else {
                painelInteracaoHtml = `
                <div class="live-status-box">
                    <span class="live-badge">⏰ TURNO DO OPONENTE</span>
                    <div class="live-text">Aguardando ${oponenteNome || 'oponente'} fazer uma pergunta ou chute...</div>
                </div>`;
            }
        }

        let gridHtml = SIMPSONS.map(p => {
            const isFlipped = window.cartasFlipped[p.id] ? 'flipped' : '';
            return `
                <div class="character-card ${isFlipped}" onclick="window.toggleCartaLocal(${p.id}, this)">
                    <img src="${p.img}" alt="${p.nome}" loading="lazy">
                    <span class="character-name">${p.nome}</span>
                </div>
            `;
        }).join('');

        const historicoHtml = (sala.historico || []).slice(-12).map(linha => {
            if(linha.startsWith('[') || linha.includes('SISTEMA')) 
                return `<div class="chat-line system">📢 ${linha}</div>`;
            return `<div class="chat-line">💬 ${linha}</div>`;
        }).join('');

        app.innerHTML = `
            <div class="screen" style="width:100%">
                <div class="flex-between" style="margin-bottom: 12px;">
                    <div class="turn-indicator ${ehMinhaVez ? 'turn-mine' : 'turn-opponent'}">
                        ${ehMinhaVez ? '🎲 SUA VEZ!' : `👤 VEZ: ${oponenteNome || 'Aguardando'}`}
                    </div>
                    <div class="secret-badge">
                        🕵️ SEU SEGREDO:<br><strong>${meuSecretoObj ? meuSecretoObj.nome : '???'}</strong>
                    </div>
                </div>

                <div class="game-top-area">
                    <div class="history-container">
                        <div class="history-title">📜 HISTÓRICO DA PARTIDA <span>ao vivo</span></div>
                        <div class="chat-area" id="chatArea">
                            ${historicoHtml || '<div class="chat-line">✨ Aguardando movimentos...</div>'}
                        </div>
                    </div>
                    ${painelInteracaoHtml}
                </div>

                <div class="characters-grid">
                    ${gridHtml}
                </div>

                <button class="btn btn-danger" onclick="window.abandonarPartida('${sala.codigo}')" style="width:100%; margin-top:12px; border-radius:15px;">🏃 SAIR DA PARTIDA</button>
            </div>
        `;

        const chatArea = document.getElementById('chatArea');
        if(chatArea) chatArea.scrollTop = chatArea.scrollHeight;
    }

    window.enviarPergunta = async function(codigo) {
        const campo = document.getElementById('campoPergunta');
        if(!campo) return;
        const pergunta = campo.value.trim();
        if(!pergunta) { toast('Digite uma pergunta!'); return; }
        
        const snapshot = await db.ref(`salas/${codigo}`).once('value');
        const sala = snapshot.val();
        if(!sala) return;
        let hist = sala.historico || [];
        hist.push(`${usuarioAtual.nome} perguntou: "${pergunta}"`);
        
        await db.ref(`salas/${codigo}`).update({
            perguntaAtual: pergunta,
            respostaAtual: null,
            historico: hist
        });
        campo.value = '';
        toast('Pergunta enviada!');
    }

    window.enviarResposta = async function(codigo, resposta) {
        const snapshot = await db.ref(`salas/${codigo}`).once('value');
        const sala = snapshot.val();
        if(!sala) return;
        let hist = sala.historico || [];
        hist.push(`${usuarioAtual.nome} respondeu: ${resposta}`);
        const proximaVez = sala.vez === 'criador' ? 'convidado' : 'criador';
        
        await db.ref(`salas/${codigo}`).update({
            perguntaAtual: null,
            respostaAtual: null,
            vez: proximaVez,
            historico: hist
        });
        toast(`Resposta: ${resposta}! Turno trocado.`);
    }

    window.abrirModalChute = function(codigo) {
        const nomeChutado = prompt("🔍 Digite o nome exato do personagem do oponente:\n(ex: Homer Simpson, Marge Simpson, Bart...)");
        if(!nomeChutado) return;
        const validado = SIMPSONS.find(p => p.nome.toLowerCase() === nomeChutado.toLowerCase());
        if(!validado) {
            toast('Personagem não encontrado! Verifique o nome.');
            return;
        }
        executarChute(codigo, validado.id, validado.nome);
    }

    async function executarChute(codigo, personagemId, nomeFormatado) {
        const snapshot = await db.ref(`salas/${codigo}`).once('value');
        const sala = snapshot.val();
        if(!sala) return;
        
        const souCriador = sala.criadorId === meuId;
        const segredoOponenteId = souCriador ? sala.convidadoSecreto : sala.criadorSecreto;
        let hist = sala.historico || [];

        if(personagemId === segredoOponenteId) {
            hist.push(`🏆 ${usuarioAtual.nome} CHUTOU ${nomeFormatado} e ACERTOU! VITÓRIA! 🎉`);
            usuarioAtual.pontos = (usuarioAtual.pontos || 0) + 1;
            const idx = usuarios.findIndex(u => u.nome === usuarioAtual.nome);
            if(idx !== -1) { usuarios[idx].pontos = usuarioAtual.pontos; salvarUsuarios(); setUsuario(usuarioAtual); }
            await db.ref(`salas/${codigo}`).update({ vencedor: usuarioAtual.nome, historico: hist });
        } else {
            hist.push(`❌ ${usuarioAtual.nome} chutou ${nomeFormatado} e ERROU! Turno perdido.`);
            const proximaVez = sala.vez === 'criador' ? 'convidado' : 'criador';
            await db.ref(`salas/${codigo}`).update({ vez: proximaVez, historico: hist });
            toast('Você errou! A vez passa para o oponente.');
        }
    }

    window.abandonarPartida = function(codigo) {
        if(confirm("Deseja abandonar a partida? Isso encerrará o jogo.")) {
            if(salaListener) salaListener.off();
            db.ref(`salas/${codigo}`).remove();
            telaPerfil();
        }
    }

    function mostrarVitoria(souVencedor, nomeVencedor, oponenteObj, codigo) {
        if(salaListener) { salaListener.off(); salaListener = null; }
        app.innerHTML = `
        <div class="victory-overlay">
            <div class="victory-card">
                <h2>${souVencedor ? '🍩 VITÓRIA! 🍩' : '💥 DERROTA! 💥'}</h2>
                <p>${nomeVencedor} descobriu o mistério!</p>
                <span style="font-size:0.85rem; font-weight:bold;">O personagem do oponente era:</span>
                <img class="victory-reveal-img" src="${oponenteObj ? oponenteObj.img : ''}">
                <strong style="display:block; margin-bottom:15px; color:#3d2100;">${oponenteObj ? oponenteObj.nome : ''}</strong>
                <button class="btn btn-donut" id="btnSairVitoria" style="width:90%">VOLTAR AO PAINEL</button>
            </div>
        </div>`;
        document.getElementById('btnSairVitoria')?.addEventListener('click', () => {
            db.ref(`salas/${codigo}`).remove();
            telaPerfil();
        });
    }
</script>
</body>
</html>
